<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}On mange quoi ?{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% if user %}
    <nav class="app-nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">🍽️ On mange quoi</a>
            <ul class="nav-links">
                <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Aujourd'hui</a></li>
                <li><a href="/meals" class="{% if request.url.path.startswith('/meals') %}active{% endif %}">Plats</a></li>
                <li><a href="/planner" class="{% if request.url.path.startswith('/planner') %}active{% endif %}">Planning</a></li>
                <li><a href="/history" class="{% if request.url.path == '/history' %}active{% endif %}">Historique</a></li>
                <li><a href="/shopping" class="{% if request.url.path == '/shopping' %}active{% endif %}">Courses</a></li>
            </ul>
            <div class="nav-user">
                <span class="user-avatar">{{ user[0]|upper }}</span>
                <span>{{ user }}</span>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
